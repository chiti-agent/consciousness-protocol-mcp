name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  local-tests:
    name: Local tests + Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn typecheck

      - name: Generate test fixtures
        run: node --import tsx/esm tests/fixtures/generate.ts

      - name: Run chain tests
        run: node --import tsx/esm --test tests/level-b/chain.test.ts

      - name: Run setup tests
        run: node --import tsx/esm --test tests/level-b/setup.test.ts

      - name: Run search tests
        run: node --import tsx/esm --test tests/level-b/search.test.ts

      - name: Build
        run: yarn build

  onchain-tests:
    name: On-chain tests (Story testnet)
    runs-on: ubuntu-latest
    needs: local-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      MAIN_WALLET_KEY: ${{ secrets.EVM_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Setup (wallets + fixtures)
        run: yarn test:setup

      - name: Register tests (9 asset types)
        run: node --import tsx/esm --test tests/level-b/register.test.ts
        timeout-minutes: 10

      - name: Derivative tests
        run: node --import tsx/esm --test tests/level-b/derivative.test.ts
        timeout-minutes: 10

      - name: License + royalty tests
        run: node --import tsx/esm --test tests/level-b/license.test.ts
        timeout-minutes: 10
